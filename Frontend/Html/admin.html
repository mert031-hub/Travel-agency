<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>VIP Kıbrıs - Admin Panel</title>
    <link rel="icon" type="image/jpeg" href="/Frontend/photo/favicon.jpeg">
    <link rel="apple-touch-icon" href="/Frontend/photo/favicon.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/Frontend/Css/admin.css">
</head>

<body>
    <div class="admin-container">
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-list-ul"></i>
                <div class="stat-info">
                    <h3 id="statTotal">0</h3>
                    <p>Toplam Talep</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-bell" style="color: var(--warning);"></i>
                <div class="stat-info">
                    <h3 id="statNew">0</h3>
                    <p>Bekleyen</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-trash-alt" style="color: var(--danger);"></i>
                <div class="stat-info">
                    <h3 id="statTrash">0</h3>
                    <p>Çöp Kutusu</p>
                </div>
            </div>
        </div>

        <div class="toolbar" id="mainToolbar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="İsim, telefon veya güzergah ara..."
                    onkeyup="tabloyuFiltrele()">
            </div>
            <button onclick="aktifSekmeyiYenile()" class="btn-refresh"><i class="fas fa-sync-alt"></i> Yenile</button>
            <button onclick="cikisYap()" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Çıkış Yap</button>
        </div>

        <div class="main-card">
            <div class="tabs">
                <button class="tab-btn active" id="btnActive" onclick="tabDegistir('active')"><i
                        class="fas fa-envelope"></i> Aktif Talepler</button>
                <button class="tab-btn" id="btnTrash" onclick="tabDegistir('trash')"><i class="fas fa-trash"></i> Çöp
                    Kutusu</button>
                <button class="tab-btn" id="btnVehicles" onclick="tabDegistir('vehicles')"><i class="fas fa-car"></i>
                    Araç Filosu</button>
            </div>

            <div id="reservationsSection">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 110px;">Tarih</th>
                            <th style="width: 180px;">Müşteri</th>
                            <th style="width: 180px;">Güzergah</th>
                            <th>Mesaj / Not</th>
                            <th style="width: 120px;">Tip</th>
                            <th style="width: 140px;">İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div id="vehiclesSection" style="display: none;">
                <button class="btn-add-vehicle" onclick="aracModalAc()"><i class="fas fa-plus"></i> Yeni Araç
                    Ekle</button>
                <div class="vehicle-grid" id="vehicleGrid">
                </div>
            </div>

        </div>
    </div>

    <div class="custom-modal-overlay" id="vehicleModal">
        <div class="custom-modal">
            <div class="modal-header">
                <h3 id="modalTitle">Yeni Araç Ekle</h3>
                <button class="btn-close-modal" onclick="aracModalKapat()"><i class="fas fa-times"></i></button>
            </div>

            <form id="vehicleForm" onsubmit="aracKaydet(event)">
                <input type="hidden" id="aracId" name="aracId">

                <div class="form-group">
                    <label>Araç Adı (Örn: Mercedes Vito VIP)</label>
                    <input type="text" id="aracAd" name="aracAd" required placeholder="Aracın marka ve modelini girin">
                </div>

                <div class="form-group">
                    <label>Araç Özellikleri (Yeni özellik yazıp Ekle'ye basın)</label>
                    <div class="dynamic-feature-input">
                        <input type="text" id="yeniOzellikInput"
                            placeholder="Örn: 15+1 Kişi, TV Ünitesi, Deri Koltuk..."
                            onkeypress="if(event.key === 'Enter') { event.preventDefault(); ozellikEkle(); }">
                        <button type="button" class="btn-add-feature" onclick="ozellikEkle()">
                            <i class="fas fa-plus"></i> Ekle
                        </button>
                    </div>

                    <div class="feature-tags-container" id="featureTagsContainer">
                    </div>

                    <input type="hidden" id="aracOzelliklerGizli" name="aracOzellikler">
                </div>

                <div class="form-group">
                    <label>Araç Fotoğrafı (VIP Görünüm İçin 1920x1080 Önerilir)</label>
                    <div class="upload-area" id="dropZone" onclick="document.getElementById('aracFotoInput').click()">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Fotoğrafı buraya sürükleyin veya seçmek için tıklayın</p>
                        <input type="file" id="aracFotoInput" name="aracFoto" accept="image/*" hidden
                            onchange="fotoOnizlemeYap(this)">
                    </div>
                    <div class="img-preview-box" id="imagePreviewBox">
                        <img src="" id="previewImg">
                        <button type="button" class="btn-remove-img" onclick="fotoKaldir()">Kaldır</button>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="tab-btn" onclick="aracModalKapat()">İptal</button>
                    <button type="submit" class="btn-save-modal" id="btnSaveVehicle"><i class="fas fa-save"></i>
                        Kaydet</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/Frontend/Js/admin.js"></script>
    <div id="bp-preloader">
        <div class="bp-glass-panel">
            <div class="bp-spinner"></div>
            <div class="bp-brand">BUĞRA POLAT</div>
            <div class="bp-sub">VIP TRANSFER & TURİZM</div>
        </div>
    </div>

    <script>
        // ASLA TAKILI KALMAYAN GÜVENLİK KODU
        (function () {
            var preloader = document.getElementById('bp-preloader');
            if (!preloader) return;
            document.body.style.overflow = 'hidden';
            function removePreloader() {
                preloader.classList.add('preloader-hide');
                document.body.style.overflow = '';
                setTimeout(function () { preloader.style.display = 'none'; }, 800);
            }
            window.addEventListener('load', function () { setTimeout(removePreloader, 500); });
            setTimeout(removePreloader, 2500);
        })();
    </script>
</body>

</html>
