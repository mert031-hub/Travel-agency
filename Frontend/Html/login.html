<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisteme Giriş - VIP Kıbrıs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="icon" type="image/jpeg" href="/Frontend/photo/favicon.jpeg">
    <link rel="apple-touch-icon" href="/Frontend/photo/favicon.jpeg">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- 1. DÜZELTİLMİŞ PRELOADER STİLLERİ --- */
        #bp-preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f3d7a;
            /* Giriş sayfasıyla uyumlu lacivert arka plan */
            z-index: 999999;
            display: flex;
            /* !important KALDIRILDI */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .preloader-hide {
            opacity: 0 !important;
            visibility: hidden !important;
        }

        .bp-spinner {
            width: 45px;
            height: 45px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        .bp-brand {
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 5px;
        }

        .bp-sub {
            color: #d4af37;
            font-size: 11px;
            letter-spacing: 3px;
            font-weight: 600;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* --- 2. GİRİŞ PANELİ STİLLERİ --- */
        body {
            background: linear-gradient(135deg, #0f3d7a 0%, #1e5ba3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .login-container h2 {
            color: #0f3d7a;
            margin-top: 0;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 14px;
            color: #888;
        }

        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #0f3d7a;
            box-shadow: 0 0 5px rgba(15, 61, 122, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #0f3d7a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #0a2955;
            transform: translateY(-2px);
        }

        .btn-login:disabled {
            background: #666;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div id="bp-preloader">
        <div class="bp-spinner"></div>
        <div class="bp-brand">BUĞRA POLAT</div>
        <div class="bp-sub">YÖNETİM PANELİ</div>
    </div>

    <div class="login-container">
        <h2>Yönetici Girişi</h2>
        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Kullanıcı Adı" required autocomplete="off">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Şifre" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Giriş Yap</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Kontrol Ediliyor...';
            btn.disabled = true;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        kullaniciAdi: document.getElementById('username').value,
                        sifre: document.getElementById('password').value
                    })
                });
                const data = await res.json();

                if (data.basari) {
                    Swal.fire({ icon: 'success', title: 'Hoş Geldiniz', text: 'Yönlendiriliyorsunuz...', showConfirmButton: false, timer: 1500 });
                    setTimeout(() => window.location.href = '/admin', 1500);
                } else {
                    Swal.fire({ icon: 'error', title: 'Hata', text: data.mesaj, confirmButtonColor: '#0f3d7a' });
                    btn.innerHTML = 'Giriş Yap';
                    btn.disabled = false;
                }
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'Hata', text: 'Sunucuya bağlanılamadı.', confirmButtonColor: '#0f3d7a' });
                btn.innerHTML = 'Giriş Yap';
                btn.disabled = false;
            }
        });
    </script>
    <script src="/Frontend/Js/main.js"></script>

    <script>
        (function () {
            var preloader = document.getElementById('bp-preloader');
            if (!preloader) return;

            function removePreloader() {
                preloader.classList.add('preloader-hide');
                // DOM'dan tamamen gizleyerek tıklamaların forma geçmesini garanti altına alıyoruz
                setTimeout(function () { preloader.style.setProperty('display', 'none', 'important'); }, 500);
            }

            window.addEventListener('load', function () {
                setTimeout(removePreloader, 300);
            });
            setTimeout(removePreloader, 2000);
        })();
    </script>
</body>

</html>
